services:
  app:
    build: .
    ports:
      - "8501:8501"
    environment:
      # BSC RPC URL (可替换为其他节点如 Ankr, QuickNode 等)
      - BSC_RPC_URL=https://bsc-dataseed.binance.org
      # 缓存刷新间隔 (秒)
      - CACHE_REFRESH_INTERVAL=3600
    volumes:
      # 数据持久化：将容器内 .cache 映射到本地 ./cache-data 目录
      - ./cache-data:/app/.cache
    restart: unless-stopped
